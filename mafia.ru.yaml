Search chats head text: 'В эти чаты вы можете зайти поиграть в полную версию мафии. Будьте вежливы в чатах и уточните правила игры/общения в этих чатах. \n⚠ Внимание! Ниже указаны чаты с платной подпиской, они не имеют отношения к администрации Black Mafia\n'
About anarchy text: 'Режим <b>АНАРХИЯ</b> доступен только в платной версии чата. Для запуска регистрации в режиме <b>АНАРХИЯ</b> нужно в чате ввести <code>/game2@{{ botName }}</code>. Если вы не хотите покупать платную версию мафии, то вы можете посетить другие чаты с платной версией по команде /search.\n\nВ режиме <b>АНАРХИЯ</b> количество мафий 1 к 3, т.е. на 3 человека 1 мафия, на 6 человек 2 мафии, на 9 человек 3 мафии и т.д. Комиссар всегда может стрелять, даже в первую ночь. По-умолчанию включен режим FriendlyFire (убийство своих, можно выключить в настройках), дон может убить мафию или хакера. Активные роли выдаются чаще, вплоть до 21 игроков нет мирных жителей вообще. Клоун всегда включен, убрать в этом режиме его нельзя.\n\nРаспределение ролей:'
About infection text: >
    Режим <b>ЗАРАЖЕНИЕ</b> доступен только в платной версии чата. Для запуска регистрации в режиме <b>ЗАРАЖЕНИЕ</b> нужно в чате ввести <code>/game3@{{ botName }}</code>. Если вы не хотите покупать платную версию мафии, то вы можете посетить другие чаты с платной версией по команде /search.
    
    \nВ режиме <b>ЗАРАЖЕНИЕ</b> количество мафий 1 к 3, т.е. на 3 человека 1 мафия, на 6 человек 2 мафии, на 9 человек 3 мафии и т.д. Комиссар всегда может стрелять, даже в первую ночь. По-умолчанию включен режим FriendlyFire (убийство своих, можно выключить в настройках), дон может убить мафию или хакера. Активные роли выдаются чаще, вплоть до 21 игроков нет мирных жителей вообще. <b>🤡 Клоун</b> всегда выключен, включить в этом режиме его нельзя.
    
    \nОт 13 игроков, добавляется один зараженный игрок. Задача зараженного заразить всех, задача остальных - избавиться от зараженных.
    \nЕсли <b>👨🏼‍⚕️ Доктор</b> придет к <b>🧟 Зараженному</b>, то <b>🧟 Зараженный</b> станет <b>👨🏼 Мирным жителем</b> с шансом 75%, иначе <b>👨🏼‍⚕️ Доктор</b> сам станет <b>🧟 Зараженным</b>.
    \nЕсли <b>💣 Камикадзе</b> после повешенья придет к <b>🧟 Зараженному</b>, то <b>🧟 Зараженный</b> умрет.
    \nЕсли любой другой игрок придет к <b>🧟 Зараженному</b>, то он сам станет <b>🧟 Зараженным</b> с вероятностью 75%, НО, если в эту ночь у игрока будет <b>👨🏼‍⚕️ Доктор</b>, то шанс заражения 25%, если игрок не заразился, то он сделает ход, например:
    \n<b>🕵️‍ Комиссар Каттани</b> проверяет <b>🧟 Зараженного</b>, <b>👨🏼‍⚕️ Доктор</b> лечит <b>🕵️‍ Комиссара Каттани</b>, если <b>🕵️‍ Комиссар Каттани</b> не превращается в <b>🧟 Зараженного</b>, то ему придет чек!
    \nМафия в этом режиме не выигрывает, даже если их большинство, если в игре есть хотя бы один <b>🧟 Зараженный</b>.
    \nУ <b>👨🏻‍💼 Журналиста</b> зараженные игроки помечаются в отдельном клане, <b>👨🏻‍💼 Журналист</b> не ходит к игрокам, а собирает на них досье, поэтому не может заразиться.
    
    \nОт <b>🧟 Зараженного</b> можно избавиться только 4-мя способами:
        1) повесить днем
        2) вылечить ночью
        3) повесить камикадзе, чтобы он взорвал зараженного
        4) доктор должен вылечить того, кто стреляет по зараженному, либо 25% удачи
    
    \nПри победе <b>🧟 Зараженных</b>, выигрывают только те <b>🧟 Зараженные</b>, которые заразили хотя бы одного игрока!
    
    \nРаспределение ролей:
About yakuza text: >
    Режим <b>ЯКУДЗА</b> доступен только в платной версии чата. Для запуска регистрации в режиме <b>ЯКУДЗА</b> нужно в чате ввести <code>/game4@{{ botName }}</code>. Если вы не хотите покупать платную версию мафии, то вы можете посетить другие чаты с платной версией по команде /search.
    
    \nВ режиме <b>ЯКУДЗА</b> 2 клана мафии, обычная мафия ({{ mafRoles }}) и якудза ({{ yakuzaRoles }}).
    
    \nВ данном режиме <b>минимум</b> должно быть {{ yakuzaMinRoles }} игроков, если {{ yakuzaMinRoles }} игроков не будет, игра не стартанет.
    \nМирные жители знают друг-друга и могут общаться в общем чате, <b>🕵️‍ Комиссар Каттани</b> в этом режиме не проверяет, а только стреляет.
    \nПобеждает только один из кланов: мирные жители, мафия, якудза.
    \n<b>⚖️ Дневная защита</b> работает у <b><u>ВСЕХ</u></b>.
    
    \nОписание ролей доступно по команде: /roles
    
    \nПри игроках не кратным 3-м, добавляются маньяки
    
