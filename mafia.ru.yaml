Role user info: 'Ничего не делает, спит ночью, голосует днем'
Role don info: 'Глава мафии, именно он выбирает кого убивать'
Role doc info: 'Выбирает игрока, которого хочет вылечить, спасает этого игрока от убийства и от заражения любовницей ночью, себя может лечить только 1 раз за игру'
Role kom info: 'Ночью может проверить игрока и узнать его роль или убить кого-то'
Role maf info: 'Сообщник дона, если дон спит, то жертва будет выбор мафии, после смерти дона одна из мафии становится новым доном'
Role suic info: 'Для победы нужно умереть на дневном голосовании'
Role bomj info: 'Ночью ходит к игрокам и видит всех, кто посещал этого игрока'
Role kamik info: 'Почти как мирный житель, но если его повесят, то может с собой забрать одного игрока'
Role luba info: 'Проводит ночь с игроком, ход этого игрока ночью отменяется, если игрока не посещал доктор, то днем он лечится и не может ничего писать в чат и участвовать в голосовании'
Role sergant info: 'Помощник комиссара, ничего не может делать ночью, но видит всех, к кому ходил комиссар, после смерти комиссара сам становится им и продолжает его дело'
Role man info: 'Какой-то псих, задача убить всех, выигрывает если мертвы все остальные игроки'
Role advokat info: 'Играет за мафию выбирает клиента для защиты, если выбрал мафию и к мафии пришел комиссар, то комиссару будет показано, что это мирный житель'
Role lucky info: 'Тот же мирный житель, но при попытке убить его есть шанс 75% остаться в живых'
Role hacker info: 'Играет за мафию, взламывает ПК игроков и узнает их роли, все мафиози будут видеть роль этого игрока'
Role joker info: 'Может ночью поменять роли двух игроков местами, так же может поменять себя с кем-то, игрок может поменять роль только 1 раз за игру, если он менял себя с кем-то, то в следующую ночь новый клоун может воспользоваться ролью'
Role medic info: 'Вы играете в команде с доктором, видите кого он лечит, можете общаться с ним в чате через бота, если доктор умирает, то вы становитесь доктором и продолжаете лечить игроков'
Role bodyguard info: 'Ночью выбирает любого игрока и умирает вместо него, если на игрока готовилось покушение, выигрывает вместе с мирными жителями если остался жив, либо если спасенная жертва выиграла (спасая кого-то от убийства, телохранитель не может быть спасен доктором или защитой)'
Role werewolf info: 'До превращения обычный мирный житель, ничего не делает ночью, голосует днем, если убивает дон или проверяет хакер, то становится мафией, если проверяет/убивает комиссар, то становится сержантом, если лечит доктор, то становится мед. сестрой. Телохранитель и защиты не спасают от превращения!'
Role spy info: 'Играет за мафию, ночью ходит к игрокам и все мафиози знают, кто был у этого игрока'
Role journalist info: 'Ночью выбирает 2-ух игроков, с утра показывает принадлежат ли игроки к одному клану или нет; В игре 4 клана\n    1 - Дон, Мафия, Адвокат, Хакер, Шпион;\n    2 - Мирный житель, Комиссар, Доктор, Сержант, Бомж, Камикадзе, Счастливчик, Любовница, Телохранитель, Мед. сестра, Оборотень (до превращения), Клоун;\n    3 - Маньяк;\n    4 - Самоубийца;\n    5 - Зараженный;\n    6 - Оябун, Якудза, Громила, Ниндзя, Обманщик'
Role infected info: 'Игрок с вирусом, играет в отдельном клане, если придет доктор - станет мирным жителем с вероятностью {{ docPercent }}% и с вероятностью {{ docNotLecPercent }}% доктор заразится, если придет камикадзе после повешенья - вы умрет, если придет любой другой игрок - то тот игрок станет зараженным с вероятностью {{ percent }}%, выигрывает только если все живые заражены'
Role kamik settings info: 'В платном чате можно включить настройку, чтобы при убийстве ночью он взрывался и с собой забирал всех, кто в эту ночь к нему пришел'
