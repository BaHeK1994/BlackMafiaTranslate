Search chats head text: 'You can join these chats to play the full version of mafia. Be polite in the chats and clarify the rules of play/communication in these chats. \n⚠ Attention! Listed below are chats with a paid subscription, they are not affiliated with the Black Mafia administration\n'
About anarchy text: 'The <b>ANARCHY</b> mode is available only in the paid version of the chat. To start registration in <b>ANARCHY</b> mode you need to type <code>/game2@{{ botName }}</code> in the chat. If you do not want to buy the paid version of mafia, you can visit other chats with the paid version using the /search command.\n\nIn <b>ANARCHY</b> mode the number of mafia is 1 to 3, i.e. 1 mafia per 3 people, 2 mafia per 6 people, 3 mafia per 9 people, etc. The commissioner can always shoot, even on the first night. By default FriendlyFire mode is enabled (killing your own, can be disabled in settings), the don can kill the mafia or the hacker. Active roles are given out more often, and up to 21 players there are no civilians at all. The clown is always enabled, it cannot be removed in this mode.\n\nRole distribution:'
About infection text: >
    The <b>INFECTION</b> mode is available only in the paid version of the chat. To start registration in <b>INFECTION</b> mode you need to type <code>/game3@{{ botName }}</code> in the chat. If you do not want to buy the paid version of mafia, you can visit other chats with the paid version using the /search command.
    
    \nIn <b>INFECTION</b> mode the number of mafia is 1 to 3, i.e. 1 mafia per 3 people, 2 mafia per 6 people, 3 mafia per 9 people, etc. The commissioner can always shoot, even on the first night. By default FriendlyFire mode is enabled (killing your own, can be disabled in settings), the don can kill the mafia or the hacker. Active roles are given out more often, and up to 21 players there are no civilians at all. The <b>🤡 Clown</b> is always disabled, it cannot be enabled in this mode.
    
    \nFrom 13 players, one infected player is added. The infected's task is to infect everyone, the others' task is to get rid of the infected.
    \nIf the <b>👨🏼‍⚕️ Doctor</b> comes to the <b>🧟 Infected</b>, the <b>🧟 Infected</b> becomes a <b>👨🏼 Civilian</b> with a 75% chance, otherwise the <b>👨🏼‍⚕️ Doctor</b> themselves becomes <b>🧟 Infected</b>.
    \nIf the <b>💣 Kamikaze</b> comes to the <b>🧟 Infected</b> after being hanged, the <b>🧟 Infected</b> dies.
    \nIf any other player comes to the <b>🧟 Infected</b>, they themselves become <b>🧟 Infected</b> with a 75% probability, BUT if that night the player had the <b>👨🏼‍⚕️ Doctor</b>, the infection chance is 25%; if the player was not infected, they make their move, for example:
    \n<b>🕵️‍ Commissioner Cattani</b> checks the <b>🧟 Infected</b>, the <b>👨🏼‍⚕️ Doctor</b> heals <b>🕵️‍ Commissioner Cattani</b>; if <b>🕵️‍ Commissioner Cattani</b> does not turn into the <b>🧟 Infected</b>, they will get their check!
    \nThe mafia in this mode does not win, even if they are the majority, as long as there is at least one <b>🧟 Infected</b> in the game.
    \nFor the <b>👨🏻‍💼 Journalist</b>, infected players are marked in a separate clan; the <b>👨🏻‍💼 Journalist</b> does not visit players but gathers dossiers on them, so they cannot get infected.
    
    \nThe <b>🧟 Infected</b> can only be gotten rid of in 4 ways:
        1) hang them during the day
        2) heal them at night
        3) hang the kamikaze so they blow up the infected
        4) the doctor must heal the one who shoots at the infected, or 25% luck
    
    \nWhen the <b>🧟 Infected</b> win, only those <b>🧟 Infected</b> who infected at least one player win!
    
    \nRole distribution:
About yakuza text: >
    The <b>YAKUZA</b> mode is available only in the paid version of the chat. To start registration in <b>YAKUZA</b> mode you need to type <code>/game4@{{ botName }}</code> in the chat. If you do not want to buy the paid version of mafia, you can visit other chats with the paid version using the /search command.
    
    \nIn <b>YAKUZA</b> mode there are 2 mafia clans, the regular mafia ({{ mafRoles }}) and the yakuza ({{ yakuzaRoles }}).
    
    \nIn this mode there must be <b>at least</b> {{ yakuzaMinRoles }} players; if there are not {{ yakuzaMinRoles }} players, the game will not start.
    \nThe civilians know each other and can communicate in the common chat, <b>🕵️‍ Commissioner Cattani</b> in this mode does not check but only shoots.
    \nOnly one of the clans wins: civilians, mafia, yakuza.
    \nThe <b>⚖️ Day protection</b> works for <b><u>EVERYONE</u></b>.
    
    \nThe description of the roles is available with the command: /roles
    
    \nWhen the number of players is not a multiple of 3, maniacs are added
    
    \nRole distribution:
