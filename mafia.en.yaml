Role user info: 'Does nothing, sleeps at night, votes during the day'
Role don info: 'Head of the mafia, the one who chooses who to kill'
Role doc info: 'Chooses a player they want to heal, saves that player from being killed and from being infected by the mistress at night; can heal themselves only once per game'
Role kom info: 'At night can check a player and learn their role, or kill someone'
Role maf info: 'The don''s accomplice; if the don is asleep, the victim will be the mafia''s choice; after the don''s death one of the mafia becomes the new don'
Role suic info: 'To win you need to die during the daytime vote'
Role bomj info: 'At night visits players and sees everyone who visited that player'
Role kamik info: 'Almost like a civilian, but if hanged they can take one player with them'
Role luba info: 'Spends the night with a player, that player''s night action is cancelled; if the player was not visited by the doctor, during the day they are recovering and cannot write in the chat or take part in the vote'
Role sergant info: 'The commissioner''s assistant, can do nothing at night but sees everyone the commissioner visited; after the commissioner''s death becomes the commissioner and continues their work'
Role man info: 'Some kind of psycho, the task is to kill everyone, wins if all other players are dead'
Role advokat info: 'Plays for the mafia, chooses a client to defend; if they chose the mafia and the commissioner comes to that mafia, the commissioner will be shown that they are a civilian'
Role lucky info: 'Same as a civilian, but when someone tries to kill them there is a 75% chance to stay alive'
Role hacker info: 'Plays for the mafia, hacks players'' PCs and learns their roles, all mafiosi will see this player''s role'
Role joker info: 'At night can swap the roles of two players; can also swap themselves with someone; a player can have their role changed only once per game; if they swapped themselves with someone, the next night a new clown can use the role'
Role medic info: 'You play on a team with the doctor, see who they heal, can communicate with them in the chat through the bot; if the doctor dies, you become the doctor and continue to heal players'
Role bodyguard info: 'At night chooses any player and dies in their place if an attack on the player was being prepared; wins together with the civilians if they stay alive, or if the saved victim won (when saving someone from being killed, the bodyguard cannot be saved by the doctor or by protection)'
Role werewolf info: 'Before transforming, an ordinary civilian, does nothing at night, votes during the day; if the don kills them or the hacker checks them, they become mafia; if the commissioner checks/kills them, they become a sergeant; if the doctor heals them, they become a nurse. The bodyguard and protections do not save from transformation!'
Role spy info: 'Plays for the mafia, at night visits players and all mafiosi know who was at that player''s'
Role journalist info: 'At night chooses 2 players, in the morning shows whether the players belong to the same clan or not; There are 4 clans in the game\n    1 - Don, Mafia, Lawyer, Hacker, Spy;\n    2 - Civilian, Commissioner, Doctor, Sergeant, Hobo, Kamikaze, Lucky one, Mistress, Bodyguard, Nurse, Werewolf (before transforming), Clown;\n    3 - Maniac;\n    4 - Suicide;\n    5 - Infected;\n    6 - Oyabun, Yakuza, Thug, Ninja, Trickster'
Role infected info: 'A player with a virus, plays in a separate clan; if the doctor comes, becomes a civilian with a {{ docPercent }}% chance and with a {{ docNotLecPercent }}% chance the doctor gets infected; if the kamikaze comes after being hanged, you die; if any other player comes, that player becomes infected with a {{ percent }}% chance; wins only if all the living are infected'
Role kamik settings info: 'In a paid chat you can enable a setting so that when killed at night they explode and take everyone who came to them that night along'
Role kamik add info: 'If killed at night, explodes and everyone who came to them that night dies'
Role kamik add to user info: ', if you are killed at night, everyone who came to you that night dies'
Role joker settings info: 'In a paid chat you can enable a setting so that once per game all roles can be shuffled, if there were no swaps before'
Role joker add info: 'Once per game all roles could be shuffled, if there were no swaps before'
Role oyabun info: 'Head of the Yakuza group, the one who chooses who to kill'
Role yakuza info: 'The oyabun''s accomplice; if the oyabun is asleep, the victim will be the yakuza''s choice; after the oyabun''s death one of the yakuza becomes the new oyabun'
Role bully info: 'Beats up a player at night, even the mistress; that player''s night action is cancelled; if the player was not visited by the doctor, during the day they are recovering and cannot write in the chat or take part in the vote'
Role ninja info: 'Plays for the yakuza clan, at night visits players and all yakuza know who was at that player''s'
Role cheater info: 'Plays for the yakuza clan, chooses a client to rig the dossier; if they chose a bad player and the hacker also came to them, the hacker will be shown that they are a civilian'
